name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
      placeholder: "I'm building a ticket system and I need..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would the ideal API look like?
      description: Show how you'd expect to use this feature in code.
      render: python
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds or other approaches?
    validations:
      required: false
