site_name: CascadeUI
site_description: Redux-inspired UI framework for discord.py
site_author: HollowTheSilver
repo_url: https://github.com/HollowTheSilver/CascadeUI
repo_name: HollowTheSilver/CascadeUI

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: guide/installation.md
      - Quick Start: guide/quickstart.md
      - Core Concepts: guide/concepts.md
      - Five Pillars: guide/five-pillars.md
  - Guide:
      - Views: guide/views.md
      - Components: guide/components.md
      - State Management: guide/state.md
      - View Patterns: guide/patterns.md
      - Persistence: guide/persistence.md
      - Middleware: guide/middleware.md
      - Theming: guide/theming.md
      - Validation: guide/validation.md
      - DevTools: guide/devtools.md
      - Performance: guide/performance.md
      - Known Limitations: guide/known-limitations.md
  - API Reference:
      - Views: api/views.md
      - Components: api/components.md
      - State Store: api/store.md
      - Built-in Actions: api/actions.md
      - Persistence: api/persistence.md
      - Theming: api/theming.md
      - Validation: api/validation.md
  - Examples: examples.md
